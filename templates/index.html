<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Portal AI | CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .sidebar-link.active {
            background-color: #f3f4f6;
            color: #2563eb;
        }

        .chat-container {
            height: calc(100vh - 120px);
        }

        .chat-bubble-user {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border-radius: 1.25rem 1.25rem 0 1.25rem;
        }

        .chat-bubble-ai {
            background: white;
            color: #1f2937;
            border-radius: 1.25rem 1.25rem 1.25rem 0;
            border: 1px solid #e5e7eb;
        }

        /* File attachment styles */
        .file-preview {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 0.75rem;
            margin-top: 0.5rem;
            font-size: 0.85rem;
            backdrop-filter: blur(4px);
        }

        .chat-bubble-ai .file-preview {
            background: #f1f5f9;
        }

        .file-preview img.thumb {
            max-width: 200px;
            max-height: 150px;
            border-radius: 0.5rem;
            object-fit: cover;
        }

        .file-icon {
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.5rem;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .file-icon.doc {
            background: #dbeafe;
            color: #2563eb;
        }

        .file-icon.img {
            background: #fce7f3;
            color: #db2777;
        }

        .file-icon.audio {
            background: #ede9fe;
            color: #7c3aed;
        }

        .file-icon.video {
            background: #d1fae5;
            color: #059669;
        }

        /* Drag overlay */
        .drag-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(37, 99, 235, 0.08);
            border: 3px dashed #2563eb;
            border-radius: 1.5rem;
            z-index: 100;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .drag-overlay.active {
            display: flex;
        }

        /* Pending file bar */
        .pending-file-bar {
            display: none;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1rem;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 1rem;
            font-size: 0.85rem;
            color: #1e40af;
        }

        .pending-file-bar.show {
            display: flex;
        }

        .pending-file-bar .remove-file {
            cursor: pointer;
            color: #dc2626;
            font-weight: bold;
            margin-left: auto;
        }
    </style>
</head>

<body class="bg-slate-50 h-screen flex overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-72 bg-white border-r flex flex-col shadow-sm">
        <div class="p-8">
            <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Support <span
                    class="text-blue-600">AI</span></h1>
            <p class="text-xs text-slate-400 mt-1 uppercase font-bold tracking-widest">Enterprise Edition</p>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="#"
                class="sidebar-link active flex items-center px-4 py-3 text-slate-600 rounded-xl font-semibold transition">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                </svg>
                Conversations
            </a>

            <a href="#" onclick="showHistory()"
                class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl font-semibold transition group">
                <span
                    class="bg-slate-100 text-slate-500 text-[10px] px-2 py-0.5 rounded-md font-black uppercase tracking-tighter mr-3 border border-slate-200">history</span>
                <!-- Blurred placeholders as seen in screenshot -->
                <div class="space-y-1 opacity-20 group-hover:opacity-40 transition-opacity">
                    <div class="h-1.5 w-20 bg-slate-400 rounded"></div>
                    <div class="h-1.5 w-12 bg-slate-300 rounded"></div>
                </div>
            </a>

            <!-- Only visible for Agents -->
            <div id="agent-links" class="hidden pt-4 mt-4 border-t border-slate-100">
                <a href="/admin"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl font-semibold transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                    Agent Dashboard
                </a>
            </div>
        </nav>
        <div class="p-6 mt-auto border-t bg-slate-50 rounded-t-3xl">
            <div class="flex items-center">
                <div id="user-initial"
                    class="h-10 w-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold">
                    U</div>
                <div class="ml-3">
                    <p id="user-name-display" class="text-sm font-bold text-slate-800">Welcome User</p>
                    <p id="user-role-display" class="text-xs text-slate-500">Self Service</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Chat Workspace -->
    <main class="flex-1 flex flex-col relative overflow-hidden">
        <!-- Drag Overlay -->
        <div id="drag-overlay" class="drag-overlay">
            <div class="text-center">
                <div class="h-16 w-16 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-3">
                    <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                </div>
                <p class="text-blue-700 font-bold text-lg">Drop file to attach</p>
                <p class="text-blue-400 text-sm">Images, Documents, Audio, Video</p>
            </div>
        </div>

        <div id="chatbox" class="flex-1 overflow-y-auto p-10 space-y-6">
            <div class="max-w-2xl mx-auto text-center py-20">
                <div
                    class="h-20 w-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 rotate-3 shadow-xl">
                    <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                    </svg>
                </div>
                <h2 class="text-4xl font-extrabold text-slate-800 mb-4 tracking-tight">How can we help today?</h2>
                <p class="text-slate-400 text-lg">Your intelligent assistant is ready to help with product questions and
                    support.</p>
            </div>
        </div>

        <div class="p-8 bg-[#121417]/95 backdrop-blur-xl border-t border-white/5 py-10">
            <div class="max-w-5xl mx-auto flex flex-col gap-4">
                <!-- Pending file bar -->
                <div id="pending-file"
                    class="pending-file-bar bg-blue-500/10 border border-blue-500/20 px-4 py-2 rounded-2xl hidden items-center gap-3">
                    <span id="pending-file-icon" class="text-xl">📎</span>
                    <div class="flex-1 min-w-0">
                        <p id="pending-file-name" class="font-bold text-white text-sm truncate"></p>
                        <p id="pending-file-size" class="text-[10px] text-blue-400 font-bold uppercase"></p>
                    </div>
                    <button type="button" onclick="clearPendingFile()"
                        class="text-white/40 hover:text-red-500 transition px-2">✕</button>
                </div>

                <form id="chat-form" class="relative group">
                    <div
                        class="flex items-center bg-[#1e2023] rounded-3xl p-2 pl-6 shadow-2xl border border-white/5 focus-within:ring-4 focus-within:ring-blue-500/20 transition-all">
                        <input type="text" id="user-input" placeholder="Type your message..."
                            class="flex-1 bg-transparent border-0 text-white focus:ring-0 text-lg py-4 placeholder-white/20" />

                        <div class="flex items-center gap-2 pr-2">
                            <!-- File attach button -->
                            <button type="button" id="attach-btn"
                                class="w-12 h-12 flex items-center justify-center text-white/40 hover:text-white hover:bg-white/5 rounded-2xl transition"
                                title="Attach file or Paste here">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
                                </svg>
                            </button>
                            <input type="file" id="file-input" class="hidden"
                                accept=".pdf,.txt,.doc,.docx,.xlsx,.csv,.png,.jpg,.jpeg,.gif,.webp,.mp3,.wav,.ogg,.m4a,.mp4,.mov,.webm,$*.*" />

                            <button type="submit"
                                class="px-8 py-3 bg-blue-600 text-white font-black rounded-2xl hover:bg-blue-700 transition shadow-lg shadow-blue-600/20 uppercase text-xs tracking-widest">Send</button>

                            <button type="button" id="close-chat"
                                class="px-6 py-3 bg-[#2a0e0e] text-red-500 border border-red-500/20 font-black rounded-2xl hover:bg-red-500 hover:text-white transition uppercase text-xs tracking-widest">End
                                Chat</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        </div>
        </div>
    </main>

    <script>
        const chatForm = document.getElementById('chat-form');
        const closeBtn = document.getElementById('close-chat');
        const chatbox = document.getElementById('chatbox');
        const userInput = document.getElementById('user-input');
        const attachBtn = document.getElementById('attach-btn');
        const fileInput = document.getElementById('file-input');
        const pendingFileBar = document.getElementById('pending-file');
        const pendingFileName = document.getElementById('pending-file-name');
        const pendingFileSize = document.getElementById('pending-file-size');
        const pendingFileIcon = document.getElementById('pending-file-icon');
        const dragOverlay = document.getElementById('drag-overlay');
        const userId = "web_portal_user";

        let pendingFile = null;

        // AUTH & PERMISSIONS CHECK
        async function initPortal() {
            try {
                const res = await fetch('/api/auth/me');
                if (res.ok) {
                    const agent = await res.json();
                    document.getElementById('agent-links').classList.remove('hidden');
                    document.getElementById('user-name-display').innerText = agent.name;
                    document.getElementById('user-role-display').innerText = agent.role;
                    document.getElementById('user-initial').innerText = agent.name.charAt(0).toUpperCase();
                }
            } catch (err) {
                console.log("Not an agent or not logged in.");
            }
        }

        function showHistory() {
            // Simply scrolls chat to top if there is content
            chatbox.scrollTo({ top: 0, behavior: 'smooth' });
        }

        initPortal();

        // Paste support for files/images
        userInput.addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (const item of items) {
                if (item.kind === 'file') {
                    const file = item.getAsFile();
                    setPendingFile(file);
                }
            }
        });


        // File category helpers
        function getFileIcon(category) {
            const icons = { document: '📄', image: '🖼️', audio: '🎵', video: '🎬' };
            return icons[category] || '📎';
        }

        function getFileCategoryFromName(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const categories = {
                document: ['pdf', 'txt', 'doc', 'docx', 'xlsx', 'csv'],
                image: ['png', 'jpg', 'jpeg', 'gif', 'webp', 'bmp'],
                audio: ['mp3', 'wav', 'ogg', 'm4a', 'aac'],
                video: ['mp4', 'mov', 'webm', 'avi', 'mkv']
            };
            for (const [cat, exts] of Object.entries(categories)) {
                if (exts.includes(ext)) return cat;
            }
            return 'unknown';
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        // File attach button
        attachBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                setPendingFile(e.target.files[0]);
            }
        });

        function setPendingFile(file) {
            pendingFile = file;
            const category = getFileCategoryFromName(file.name);
            pendingFileIcon.innerText = getFileIcon(category);
            pendingFileName.innerText = file.name;
            pendingFileSize.innerText = formatFileSize(file.size);
            pendingFileBar.classList.add('show');
        }

        function clearPendingFile() {
            pendingFile = null;
            fileInput.value = '';
            pendingFileBar.classList.remove('show');
        }

        // Drag and drop
        let dragCounter = 0;
        const mainEl = document.querySelector('main');

        mainEl.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragCounter++;
            dragOverlay.classList.add('active');
        });

        mainEl.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dragCounter--;
            if (dragCounter <= 0) {
                dragCounter = 0;
                dragOverlay.classList.remove('active');
            }
        });

        mainEl.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        mainEl.addEventListener('drop', (e) => {
            e.preventDefault();
            dragCounter = 0;
            dragOverlay.classList.remove('active');
            if (e.dataTransfer.files.length > 0) {
                setPendingFile(e.dataTransfer.files[0]);
            }
        });

        function toggleKnowledgeBase() {
            kbModal.classList.toggle('translate-x-full');
            kbModal.classList.toggle('translate-x-0');
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();

            if (!message && !pendingFile) return;

            // Show user message in chat
            const attachmentInfo = pendingFile ? {
                original_name: pendingFile.name,
                category: getFileCategoryFromName(pendingFile.name),
                url: null, // Will be set from response
                localPreview: pendingFile.type.startsWith('image/') ? URL.createObjectURL(pendingFile) : null
            } : null;

            addMessage(message || `📎 ${pendingFile.name}`, 'user', attachmentInfo);
            userInput.value = '';

            try {
                let res;
                if (pendingFile) {
                    // Send as multipart/form-data
                    const formData = new FormData();
                    formData.append('message', message);
                    formData.append('user_id', userId);
                    formData.append('file', pendingFile);
                    res = await fetch('/api/chat', {
                        method: 'POST',
                        body: formData
                    });
                } else {
                    // Send as JSON (legacy)
                    res = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: message, user_id: userId })
                    });
                }

                const data = await res.json();
                addMessage(data.answer, 'ai');
            } catch (err) {
                addMessage("Connection error.", 'ai');
            }

            clearPendingFile();
        });

        closeBtn.addEventListener('click', async () => {
            const opt = prompt("How would you like to close the chat?\n\n1. Create ticket summary and status automatically (sent to user)\n2. Close, create ticket, send ticket number and status\n\nEnter 1 or 2:");

            if (opt !== '1' && opt !== '2') {
                if (opt !== null) alert("Invalid selection. Chat not closed.");
                return;
            }

            closeBtn.disabled = true;
            addMessage("Finalizing your ticket, please wait...", 'ai');
            try {
                const res = await fetch('/api/close-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, option: parseInt(opt) })
                });
                const data = await res.json();
                alert(data.answer);
                location.reload();
            } catch (err) { alert("Failed to close session."); }
            finally { closeBtn.disabled = false; }
        });



        function addMessage(text, type, attachment) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${type === 'user' ? 'justify-end' : 'justify-start'} animate-in slide-in-from-bottom-2 duration-300`;
            const bubble = document.createElement('div');
            bubble.className = `p-5 max-w-xl shadow-sm leading-relaxed ${type === 'user' ? 'chat-bubble-user' : 'chat-bubble-ai'}`;

            // Text content
            if (text) {
                const textEl = document.createElement('div');
                textEl.innerText = text;
                bubble.appendChild(textEl);
            }

            // Attachment preview
            if (attachment) {
                const preview = document.createElement('div');
                preview.className = 'file-preview';

                if (attachment.category === 'image' && (attachment.localPreview || attachment.url)) {
                    const img = document.createElement('img');
                    img.className = 'thumb';
                    img.src = attachment.localPreview || attachment.url;
                    img.alt = attachment.original_name;
                    preview.innerHTML = '';
                    preview.appendChild(img);
                } else if (attachment.category === 'audio' && attachment.url) {
                    const audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = attachment.url;
                    audio.style.maxWidth = '220px';
                    preview.innerHTML = '';
                    preview.appendChild(audio);
                } else if (attachment.category === 'video' && attachment.url) {
                    const video = document.createElement('video');
                    video.controls = true;
                    video.src = attachment.url;
                    video.style.maxWidth = '280px';
                    video.style.borderRadius = '0.5rem';
                    preview.innerHTML = '';
                    preview.appendChild(video);
                } else {
                    const iconEl = document.createElement('span');
                    iconEl.className = `file-icon ${attachment.category === 'document' ? 'doc' : attachment.category === 'audio' ? 'audio' : attachment.category === 'video' ? 'video' : 'img'}`;
                    iconEl.innerText = getFileIcon(attachment.category);
                    preview.appendChild(iconEl);

                    const nameEl = document.createElement('span');
                    nameEl.innerText = attachment.original_name;
                    nameEl.style.wordBreak = 'break-all';
                    preview.appendChild(nameEl);

                    if (attachment.url) {
                        const dl = document.createElement('a');
                        dl.href = attachment.url;
                        dl.target = '_blank';
                        dl.innerText = '⬇';
                        dl.title = 'Download';
                        dl.style.marginLeft = 'auto';
                        preview.appendChild(dl);
                    }
                }

                bubble.appendChild(preview);
            }

            wrapper.appendChild(bubble);
            chatbox.appendChild(wrapper);
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        async function loadHistory() {
            try {
                const res = await fetch(`/api/history?user_id=${userId}`);
                const data = await res.json();
                if (data.history && data.history.length > 0) {
                    // Hide the initial welcome message if there is history
                    const welcomeMsg = chatbox.querySelector('div.max-w-2xl');
                    if (welcomeMsg) welcomeMsg.style.display = 'none';

                    for (const msg of data.history) {
                        let attachment = null;
                        if (msg.attachments) {
                            try {
                                attachment = JSON.parse(msg.attachments);
                            } catch (e) { }
                        }

                        // Fix text formatting for uploaded files
                        let text = msg.content;
                        if (text && text.startsWith('[User uploaded a ') && attachment) {
                            text = `📎 ${attachment.original_name}`;
                        }

                        addMessage(text, msg.role, attachment);
                    }
                }
            } catch (err) {
                console.error("Failed to load history:", err);
            }
        }

        // Load history on load
        window.addEventListener('DOMContentLoaded', loadHistory);
    </script>
</body>

</html>
