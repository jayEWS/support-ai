global:
  scrape_interval: 15s # By default, scrape targets every 15 seconds.
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'support-portal-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:8000']
  
  - job_name: 'support-portal-worker'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['worker:8000']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']