name: CI — Lint, Test, Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Security: Check for leaked secrets ──
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Lint and Type Check ──
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install ruff bandit
      - name: Ruff lint
        run: ruff check . --output-format=github
      - name: Bandit security lint
        run: bandit -r app/ -f json -o bandit-report.json --severity-level medium || true
      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ── Unit and Integration Tests ──
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite:///data/db_storage/test.db"
      AUTH_SECRET_KEY: "test-secret-key-for-ci-only-not-production-use-12345678"
      API_SECRET_KEY: "test-api-secret-key-for-ci-only-not-production"
      DEBUG: "True"
      LLM_PROVIDER: "ollama"
      EMAIL_PROVIDER: "mock"
      MFA_ENABLED: "False"
      WHATSAPP_TEST_MODE: "True"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      - name: Create data directories
        run: mkdir -p data/knowledge data/db_storage data/uploads/chat
      - name: Run tests
        run: pytest tests/ -v --tb=short
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: pytest-results/

  # ── Dependency vulnerability scan ──
  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit dependencies
        run: pip-audit -r requirements.txt --output=pip-audit-report.json --format=json || true
      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json
