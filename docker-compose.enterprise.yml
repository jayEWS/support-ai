services:
  # ----------------------------------------------------------------------
  # NGINX (Reverse Proxy & User Layer)
  # ----------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: support_portal_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    depends_on:
      - api
      - grafana
    networks:
      - internal_net

  # ----------------------------------------------------------------------
  # FASTAPI (API & AI Orchestration Layer)
  # ----------------------------------------------------------------------
  api:
    build: .
    container_name: support_portal_api
    restart: always
    env_file: .env
    volumes:
      - ./data/knowledge:/app/data/knowledge
      - ./data/uploads:/app/data/uploads
    deploy:
      resources:
        limits:
          memory: 2G
    command: >
      python -m gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app
      --bind 0.0.0.0:8000 --timeout 120 --graceful-timeout 30
    depends_on:
      - redis
      - db
      - qdrant
    networks:
      - internal_net
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_ENABLED=True
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - PROMETHEUS_ENABLED=True

  # ----------------------------------------------------------------------
  # BACKGROUND WORKERS (Operations Layer - Auto Resolver & Knowledge Builder)
  # ----------------------------------------------------------------------
  worker:
    build: .
    container_name: support_portal_worker
    restart: always
    env_file: .env
    volumes:
      - ./data/knowledge:/app/data/knowledge
    deploy:
      resources:
        limits:
          memory: 1G
    # Using python/celery or native fastapi background polling script.
    # Replace the command with your specific worker start command
    command: python scripts/start_worker.py 
    depends_on:
      - redis
      - db
      - qdrant
    networks:
      - internal_net
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_ENABLED=True
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333

  # ----------------------------------------------------------------------
  # REDIS (Memory Layer - Queue & Short Term Chat Context)
  # ----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: support_portal_redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - internal_net

  # ----------------------------------------------------------------------
  # SQL SERVER (Memory Layer - Episodic Memory & Auth/Tenants)
  # ----------------------------------------------------------------------
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: support_portal_mssql
    restart: always
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:-SuperS3cureP@ssword123}"
      MSSQL_PID: "Express" # Minimal footprint
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - internal_net

  # ----------------------------------------------------------------------
  # QDRANT (Knowledge Layer - Vector Database for Semantic Memory)
  # ----------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.7.2
    container_name: support_portal_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - internal_net

  # ----------------------------------------------------------------------
  # PROMETHEUS (Monitoring - AIOps Metrics Collector)
  # ----------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: support_portal_prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - internal_net

  # ----------------------------------------------------------------------
  # GRAFANA (Monitoring - Observability Dashboard)
  # ----------------------------------------------------------------------
  grafana:
    image: grafana/grafana-oss:10.2.2
    container_name: support_portal_grafana
    restart: always
    volumes:
      - grafana_data:/var/lib/grafana
    # environment:
    #   - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - internal_net

volumes:
  redis_data:
  mssql_data:
  qdrant_data:
  prometheus_data:
  grafana_data:

networks:
  internal_net:
    driver: bridge
